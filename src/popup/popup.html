<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>SuperTextSwap</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 400px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", sans-serif;
        font-size: 14px;
        color: #1a1a1a;
        background: #f3f4f6;
      }

      /* ── Header ── */
      .header {
        background: #2563eb;
        color: #fff;
        padding: 11px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .header h1 {
        font-size: 15px;
        font-weight: 600;
      }
      .header p {
        font-size: 11px;
        opacity: 0.72;
        margin-top: 1px;
      }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
      }

      .btn-lang {
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.28);
        color: #fff;
        border-radius: 5px;
        padding: 4px 9px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.3px;
        transition: background 0.15s;
      }
      .btn-lang:hover {
        background: rgba(255, 255, 255, 0.24);
      }

      .btn-help {
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.28);
        color: #fff;
        border-radius: 50%;
        width: 26px;
        height: 26px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: background 0.15s;
      }
      .btn-help:hover {
        background: rgba(255, 255, 255, 0.24);
      }

      .btn-apply-header {
        background: rgba(255, 255, 255, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.35);
        color: #fff;
        border-radius: 6px;
        padding: 5px 11px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.15s;
      }
      .btn-apply-header:hover {
        background: rgba(255, 255, 255, 0.28);
      }
      .btn-apply-header:active {
        opacity: 0.8;
      }

      /* ── Form ── */
      .form-section {
        background: #fff;
        padding: 12px 14px 10px;
        border-bottom: 1px solid #e5e7eb;
      }
      .input-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 7px;
      }
      .input-label {
        width: 40px;
        font-size: 12px;
        color: #6b7280;
        flex-shrink: 0;
      }
      .input-row input[type="text"] {
        flex: 1;
        height: 30px;
        padding: 0 9px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 13px;
        color: #111;
        outline: none;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      .input-row input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
      }
      .input-row input::placeholder {
        color: #9ca3af;
      }

      /* ── Advanced toggle ── */
      .advanced-toggle {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-top: 8px;
        padding: 5px 0;
        cursor: pointer;
        user-select: none;
        color: #6b7280;
        font-size: 12px;
      }
      .advanced-toggle:hover {
        color: #2563eb;
      }
      .toggle-icon {
        font-size: 10px;
        display: inline-block;
        transition: transform 0.2s;
      }
      .toggle-icon.open {
        transform: rotate(180deg);
      }

      /* ── Advanced section — open by default ── */
      .advanced-section {
        display: none;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 10px 12px;
        margin-top: 6px;
        flex-direction: column;
        gap: 10px;
      }
      .advanced-section.open {
        display: flex;
      }

      .scope-block {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .scope-block-label {
        font-size: 11px;
        font-weight: 600;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }

      .radio-group {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .radio-label {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
        color: #374151;
        cursor: pointer;
      }
      .radio-label input[type="radio"] {
        margin: 0;
        cursor: pointer;
      }
      .domain-hint {
        font-style: normal;
        color: #6b7280;
        font-size: 11px;
        margin-left: 2px;
      }

      .custom-url-row {
        margin-top: 3px;
      }
      .scope-input {
        width: 100%;
        height: 28px;
        padding: 0 9px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 12px;
        color: #111;
        outline: none;
        background: #fff;
        transition: border-color 0.15s;
      }
      .scope-input:focus {
        border-color: #2563eb;
      }
      .scope-input::placeholder {
        color: #9ca3af;
      }

      .selector-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .selector-row .scope-input {
        flex: 1;
      }
      .btn-pick {
        height: 28px;
        padding: 0 10px;
        border: 1px solid #2563eb;
        border-radius: 6px;
        background: #eff6ff;
        color: #2563eb;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
        transition: background 0.15s;
      }
      .btn-pick:hover {
        background: #dbeafe;
      }
      .btn-pick:active {
        opacity: 0.8;
      }

      .checkbox-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #374151;
        cursor: pointer;
      }
      .checkbox-label input[type="checkbox"] {
        margin: 0;
        cursor: pointer;
      }

      /* ── Buttons ── */
      .btn-row {
        display: flex;
        gap: 7px;
        margin-top: 10px;
      }
      .btn {
        flex: 1;
        height: 30px;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition:
          background 0.15s,
          opacity 0.15s;
      }
      .btn:active {
        opacity: 0.82;
      }
      .btn-primary {
        background: #2563eb;
        color: #fff;
      }
      .btn-primary:hover {
        background: #1d4ed8;
      }
      .btn-danger {
        background: #fee2e2;
        color: #dc2626;
      }
      .btn-danger:hover {
        background: #fecaca;
      }

      /* ── Rules ── */
      .rules-section {
        padding: 0 14px 14px;
      }
      .rules-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 11px 0 7px;
      }
      .rules-title {
        font-size: 11px;
        font-weight: 600;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }
      .rules-count {
        font-size: 12px;
        color: #9ca3af;
      }
      .rules-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .rule-item {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 8px 10px;
      }
      .rule-main {
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .rule-from,
      .rule-to {
        flex: 1;
        font-size: 13px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .rule-from {
        color: #374151;
      }
      .rule-to {
        color: #2563eb;
      }
      .rule-arrow {
        color: #9ca3af;
        font-size: 12px;
        flex-shrink: 0;
      }
      .rule-delete {
        background: none;
        border: none;
        cursor: pointer;
        color: #d1d5db;
        font-size: 17px;
        line-height: 1;
        padding: 0 1px;
        flex-shrink: 0;
        transition: color 0.15s;
      }
      .rule-delete:hover {
        color: #dc2626;
      }

      .rule-badges {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        margin-top: 5px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 1px 7px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 500;
        max-width: 160px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .badge-url {
        background: #eff6ff;
        color: #2563eb;
        border: 1px solid #bfdbfe;
      }
      .badge-dom {
        background: #f0fdf4;
        color: #15803d;
        border: 1px solid #bbf7d0;
      }
      .badge-target {
        background: #fff7ed;
        color: #c2410c;
        border: 1px solid #fed7aa;
      }

      .empty-state {
        text-align: center;
        padding: 22px 0;
        color: #9ca3af;
        font-size: 13px;
      }
      .empty-icon {
        font-size: 26px;
        margin-bottom: 6px;
      }

      /* ── Quick actions ── */
      .quick-actions {
        background: #fff;
        border-bottom: 1px solid #e5e7eb;
        padding: 8px 14px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .quick-label {
        font-size: 11px;
        font-weight: 600;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        flex-shrink: 0;
      }
      .quick-btns {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .btn-quick {
        height: 26px;
        padding: 0 11px;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        background: #f9fafb;
        color: #374151;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      .btn-quick:hover {
        background: #eff6ff;
        border-color: #bfdbfe;
        color: #2563eb;
      }
      .btn-quick:active {
        opacity: 0.8;
      }

      /* ── Toast ── */
      .toast {
        position: fixed;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%) translateY(8px);
        background: #111827;
        color: #fff;
        padding: 5px 14px;
        border-radius: 20px;
        font-size: 12px;
        opacity: 0;
        pointer-events: none;
        white-space: nowrap;
        transition:
          opacity 0.2s,
          transform 0.2s;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* ── Help modal ── */
      .help-modal {
        position: fixed;
        inset: 0;
        z-index: 200;
        background: rgba(0, 0, 0, 0.4);
        display: none;
        align-items: flex-end;
      }
      .help-modal.open {
        display: flex;
      }
      .help-panel {
        background: #fff;
        width: 100%;
        border-radius: 12px 12px 0 0;
        max-height: 88%;
        display: flex;
        flex-direction: column;
      }
      .help-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 13px 16px 11px;
        border-bottom: 1px solid #e5e7eb;
        flex-shrink: 0;
      }
      .help-panel-title {
        font-size: 14px;
        font-weight: 600;
        color: #111;
      }
      .help-panel-close {
        background: none;
        border: none;
        font-size: 20px;
        color: #9ca3af;
        cursor: pointer;
        line-height: 1;
        padding: 0 2px;
        transition: color 0.15s;
      }
      .help-panel-close:hover {
        color: #374151;
      }
      .help-body {
        overflow-y: auto;
        padding: 12px 16px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .help-section-title {
        font-size: 12px;
        font-weight: 600;
        color: #2563eb;
        margin-bottom: 4px;
      }
      .help-section-desc {
        font-size: 12px;
        color: #6b7280;
        line-height: 1.65;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div>
        <h1 id="headerTitle">SuperTextSwap</h1>
        <p id="headerSubtitle">网页文本替换助手</p>
      </div>
      <div class="header-actions">
        <button class="btn-help" id="helpBtn">?</button>
        <button class="btn-lang" id="langToggleBtn">EN</button>
        <button class="btn-apply-header" id="applyBtn">⟳ 立即应用</button>
      </div>
    </div>

    <div class="form-section">
      <div class="input-row">
        <span class="input-label" id="fromLabel">原文本</span>
        <input type="text" id="fromInput" placeholder="输入需要替换的文本" />
      </div>
      <div class="input-row">
        <span class="input-label" id="toLabel">替换为</span>
        <input type="text" id="toInput" placeholder="输入替换后的文本" />
      </div>

      <div class="advanced-toggle" id="advancedToggle">
        <span class="toggle-icon open" id="toggleIcon">▾</span>
        <span id="advancedToggleText">限定范围 &amp; 替换目标</span>
      </div>

      <!-- open by default -->
      <div class="advanced-section open" id="advancedSection">
        <div class="scope-block">
          <div class="scope-block-label" id="urlScopeLabel">URL 范围</div>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="urlMode" value="all" checked />
              <span id="urlAll">所有页面</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="urlMode" value="domain" />
              <span id="urlDomainText">当前域名</span
              ><em class="domain-hint" id="domainLabel"></em>
            </label>
            <label class="radio-label">
              <input type="radio" name="urlMode" value="custom" />
              <span id="urlCustomText">自定义</span>
            </label>
          </div>
          <div class="custom-url-row" id="customUrlRow" style="display: none">
            <input
              class="scope-input"
              type="text"
              id="urlPatternInput"
              placeholder="例：*.zhihu.com 或 toutiao.com/article/*"
            />
          </div>
        </div>

        <div class="scope-block">
          <div class="scope-block-label" id="domScopeLabel">
            仅在此元素内生效
          </div>
          <div class="selector-row">
            <input
              class="scope-input"
              type="text"
              id="domSelectorInput"
              placeholder="CSS 选择器（留空为全页面）"
            />
            <button class="btn-pick" id="pickBtn">⊕ 拾取</button>
          </div>
        </div>

        <div class="scope-block">
          <div class="scope-block-label" id="targetLabel">替换目标（扩展）</div>
          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" id="includeInputs" />
              <span id="includeInputsLabel"
                >输入框内容（input / textarea）</span
              >
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="includeEditable" />
              <span id="includeEditableLabel"
                >富文本编辑器（contenteditable）</span
              >
            </label>
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="addBtn">添加规则</button>
        <button class="btn btn-danger" id="clearBtn">清空规则</button>
      </div>
    </div>

    <div class="quick-actions">
      <span class="quick-label" id="quickLabel">快捷操作</span>
      <div class="quick-btns">
        <button class="btn-quick" id="punctZhBtn">→ 转中文标点</button>
        <button class="btn-quick" id="punctEnBtn">→ 转英文标点</button>
      </div>
    </div>

    <div class="rules-section">
      <div class="rules-header">
        <span class="rules-title" id="rulesTitle">替换规则</span>
        <span class="rules-count" id="rulesCount">0 条</span>
      </div>
      <div class="rules-list" id="rulesList"></div>
    </div>

    <!-- Help modal (bottom sheet) -->
    <div class="help-modal" id="helpModal">
      <div class="help-panel">
        <div class="help-panel-header">
          <span class="help-panel-title" id="helpTitle">功能说明</span>
          <button class="help-panel-close" id="helpClose">×</button>
        </div>
        <div class="help-body" id="helpBody"></div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="popup.js"></script>
  </body>
</html>
